# Node 1 — Multi-Laptop Config
# Run on: Laptop A
#
# HOW TO USE:
#   1. Replace LAPTOP_A_IP with this laptop's IP  (run: ipconfig)
#   2. Replace LAPTOP_B_IP with Laptop B's IP
#   3. Replace LAPTOP_C_IP with Laptop C's IP
#   Example IP: 192.168.1.10
#
node:
  id: 1
  grpc_port: 50051
  http_port: 8081

peers:
  - id: 2
    address: "LAPTOP_B_IP"
    grpc_port: 50052
  - id: 3
    address: "LAPTOP_C_IP"
    grpc_port: 50053
  - id: 4
    address: "LAPTOP_D_IP"
    grpc_port: 50054

seats:
  rows: ["A", "B", "C"]
  cols_per_row: 4

heartbeat:
  interval_ms: 2000
  timeout_ms: 5000

election:
  timeout_ms: 3000
