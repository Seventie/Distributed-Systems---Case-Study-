# Node 3 — Multi-Laptop Config
# Run on: Laptop C
#
# HOW TO USE:
#   1. Replace LAPTOP_A_IP with Laptop A's IP
#   2. Replace LAPTOP_B_IP with Laptop B's IP
#   3. Replace LAPTOP_C_IP with this laptop's IP  (run: ipconfig)
#   Example IP: 192.168.1.12
#
node:
  id: 3
  grpc_port: 50053
  http_port: 8083

peers:
  - id: 1
    address: "LAPTOP_A_IP"
    grpc_port: 50051
  - id: 2
    address: "LAPTOP_B_IP"
    grpc_port: 50052
  - id: 4
    address: "LAPTOP_D_IP"
    grpc_port: 50054

seats:
  rows: ["A", "B", "C"]
  cols_per_row: 4

heartbeat:
  interval_ms: 2000
  timeout_ms: 5000

election:
  timeout_ms: 3000
