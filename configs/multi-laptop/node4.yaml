# Node 4 — Multi-Laptop Config
# Run on: Laptop D
#
# HOW TO USE:
#   1. Replace ALL IP placeholders with actual local IPs of the PCs.
#
node:
  id: 4
  grpc_port: 50054
  http_port: 8084

peers:
  - id: 1
    address: "LAPTOP_A_IP"
    grpc_port: 50051
  - id: 2
    address: "LAPTOP_B_IP"
    grpc_port: 50052
  - id: 3
    address: "LAPTOP_C_IP"
    grpc_port: 50053

seats:
  rows: ["A", "B", "C"]
  cols_per_row: 4

heartbeat:
  interval_ms: 2000
  timeout_ms: 5000

election:
  timeout_ms: 3000
